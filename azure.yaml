# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

name: fibreops
metadata:
  template: fibreops-brk241

infra:
  provider: bicep
  path: infra
  module: main

services:
  fibreops-noc:
    project: .
    language: python
    host: appservice
    docker:
      path: src/fibreops/Dockerfile
      context: .
      # Build the image with an ACR Task instead of a local Docker daemon.
      # Without this, `azd` requires a running local Docker engine; if none is
      # available it can silently fall back to a code/zip deploy, leaving the
      # App Service on the placeholder image (mcr.microsoft.com/k8se/quickstart)
      # and the site returns an Application Error. remoteBuild makes `azd up`
      # build + push fibreops-noc to ACR and point the web app at it every time.
      remoteBuild: true

# Finish the COMPLETE solution after the NOC console image is deployed.
# `azd up` provisions infra (incl. the Voice Live AI Services account) and the
# NOC console; this hook then (1) publishes the three role Prompt Agents the
# default `hosted` backend binds to — required for the console to produce runs —
# and (2) optionally deploys the containerised hosted agent. Logic lives in
# scripts/postdeploy.ps1. continueOnError keeps a Foundry RBAC gap from failing
# the web-app deploy.
#   - Publish runs by default; disable with `azd env set FIBREOPS_SKIP_PUBLISH true`.
#   - Hosted agent is OFF by default; enable with `azd env set FIBREOPS_DEPLOY_HOSTED true`.
hooks:
  postdeploy:
    shell: pwsh
    continueOnError: true
    interactive: true
    run: ./scripts/postdeploy.ps1
